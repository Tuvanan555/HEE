        let filteredAnimals = [...animals];
        let currentFilter = 'all';

        // สร้างปุ่มกรอง
        function createFilterButtons() {
            const orders = [...new Set(animals.map(animal => animal.order))];
            const filterButtons = document.getElementById('filterButtons');
            
            orders.forEach(order => {
                const button = document.createElement('button');
                button.className = 'filter-btn';
                button.textContent = order;
                button.dataset.order = order;
                button.addEventListener('click', () => filterByOrder(order));
                filterButtons.appendChild(button);
            });
        }

        // กรองตามอันดับ
        function filterByOrder(order) {
            currentFilter = order;
            
            // อัปเดตปุ่ม active
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.order === order) {
                    btn.classList.add('active');
                }
            });

            applyFilters();
        }

        // ค้นหาสัตว์
        function searchAnimals(query) {
            if (!query.trim()) {
                return currentFilter === 'all' ? animals : animals.filter(animal => animal.order === currentFilter);
            }

            const searchTerm = query.toLowerCase().trim();
            let results = animals.filter(animal => {
                return animal.thai.toLowerCase().includes(searchTerm) ||
                       animal.english.toLowerCase().includes(searchTerm) ||
                       animal.scientific.toLowerCase().includes(searchTerm) ||
                       animal.order.toLowerCase().includes(searchTerm) ||
                       animal.habitat.toLowerCase().includes(searchTerm) ||
                       animal.food.toLowerCase().includes(searchTerm) ||
                       animal.status.toLowerCase().includes(searchTerm) ||
                       animal.description.toLowerCase().includes(searchTerm);
            });

            if (currentFilter !== 'all') {
                results = results.filter(animal => animal.order === currentFilter);
            }

            return results;
        }

        // ใช้ตัวกรองทั้งหมด
        function applyFilters() {
            const searchQuery = document.getElementById('searchInput').value;
            filteredAnimals = searchAnimals(searchQuery);
            displayAnimals(filteredAnimals);
            updateResultsInfo();
        }

        // แสดงสัตว์
        function displayAnimals(animalList) {
            const grid = document.getElementById('animalsGrid');
            const noResults = document.getElementById('noResults');

            if (animalList.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            noResults.style.display = 'none';

            grid.innerHTML = animalList.map(animal => {
                const statusClass = animal.status === 'ปกติ' ? 'status-normal' : 
                                  animal.status === 'หายาก' ? 'status-rare' : 'status-endangered';
                
                return `
                <div class="animal-card">
                    <div class="animal-icon">${animal.icon}</div>
                    <div class="animal-thai">${animal.thai}</div>
                    <div class="animal-english">${animal.english}</div>
                    <div class="animal-scientific">${animal.scientific}</div>
                    <div class="animal-order">${animal.order}</div>
                    
                    <div class="animal-details">
                        <div class="detail-row">
                            <span class="detail-label">ขนาด:</span>
                            <span class="detail-value">${animal.size}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">ที่อยู่:</span>
                            <span class="detail-value">${animal.habitat}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">อาหาร:</span>
                            <span class="detail-value">${animal.food}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">สถานะ:</span>
                            <span class="detail-value">
                                <span class="status-badge ${statusClass}">${animal.status}</span>
                            </span>
                        </div>
                    </div>
                    
                    <div class="animal-description">
                        ${animal.description}
                    </div>
                </div>
            `;
            }).join('');
